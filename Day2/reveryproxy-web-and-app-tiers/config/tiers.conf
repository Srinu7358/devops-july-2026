# ===========================================================================
#  httpd reverse proxy: web tier + app tier
#  Copy to /etc/apache2/sites-available/tiers.conf
#
#  Enable with:
#    sudo a2enmod proxy proxy_http headers rewrite
#    sudo a2dissite 000-default
#    sudo a2ensite tiers
#    sudo apachectl configtest
#    sudo systemctl reload apache2
# ===========================================================================
<VirtualHost *:80>

    ServerName localhost

    ProxyPreserveHost On
    ProxyRequests Off

    # -----------------------------------------------------------------------
    #  ORDER MATTERS. Most specific path FIRST.
    #  /api goes to the APP tier. Everything else to the WEB tier.
    #  If you put "ProxyPass /" above "ProxyPass /api", the /api line is dead
    #  and produces NO error - just silently wrong behaviour.
    # -----------------------------------------------------------------------
    ProxyPass        /api  http://127.0.0.1:9092/api
    ProxyPassReverse /api  http://127.0.0.1:9092/api

    ProxyPass        /     http://127.0.0.1:9091/
    ProxyPassReverse /     http://127.0.0.1:9091/

    RequestHeader set X-Forwarded-Proto "http"

    ErrorLog  ${APACHE_LOG_DIR}/tiers_error.log
    CustomLog ${APACHE_LOG_DIR}/tiers_access.log combined

</VirtualHost>
